<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="romantic-audio" src="romantic-song.mp3"></audio>
    <audio id="sad-audio" src="sad-song.mp3"></audio>

    <section id="proposal">
        <div class="animation-container">
            <img id="boy-img" src="boy-hiding.gif" alt="Boy hiding flowers">
        </div>
        
        <h1>I have a question for you... Will you be mine?</h1>
        
        <div class="buttons">
            <button id="btn-yes">Yes!</button>
            <button id="btn-no">No</button>
        </div>
        <p id="response-message"></p>
    </section>

    <hr>

    <section id="message">
        <h2>Why I Like You</h2>
        <div class="message-box">
            <p>Put your heartfelt message here. Tell her exactly how you feel, what you noticed about her first, and why she is special to you. Keep it genuine and from the heart.</p>
        </div>
    </section>

    <hr>

    <section id="gallery">
        <h2>A Few of My Favorite Moments</h2>
        <div class="grid">
            <img src="photo1.jpg" alt="Memory 1">
            <img src="photo2.jpg" alt="Memory 2">
            <img src="photo3.jpg" alt="Memory 3">
            <img src="photo4.jpg" alt="Memory 4">
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
